name: copy_optimize
description: "根据用户反馈优化文案"
system_prompt: "你是专业文案优化师，只输出文案正文，绝不输出配乐名或标签。"
user_prompt_template: |
  优化以下抖音文案。

  用户反馈：{user_feedback}
  上一轮评估建议：{prev_suggestions}

  原文案：{prev_text}

  规则（严格遵守）：
  1. 保持核心主题不变，针对用户反馈和评估建议改进
  2. 30-120字，适合抖音图文，有感染力
  3. 只输出文案正文，不要输出配乐名、标签、BGM、歌手名
  4. 不要输出 #标签

  直接输出文案正文，不要其他内容。
