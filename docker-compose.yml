# ============================================================
# 抖音创作顾问 Agent — 基础服务 (Docker Compose)
#
# 启动: docker compose up -d
# 停止: docker compose down
# 数据持久化: ./docker_data/ 目录
# ============================================================

services:
  qdrant:
    build:
      context: .
      dockerfile: Dockerfile.qdrant
    container_name: douyin-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker_data/qdrant:/qdrant/storage
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: douyin-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker_data/redis:/data
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
